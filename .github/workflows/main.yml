name: Build AppImage

on:
  workflow_dispatch: # Allows you to run this manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt-get clean
        sudo apt-get update --fix-missing
        sudo apt-get install -y imagemagick file desktop-file-utils


    - name: Download pkg2appimage
      run: |
        wget -c https://release-assets.githubusercontent.com/github-production-release-asset/40756369/0c79ff7e-660b-4f94-882c-36d53db0caa3?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-06-21T03%3A45%3A45Z&rscd=attachment%3B+filename%3Dpkg2appimage-1eceb30-x86_64.AppImage&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-06-21T02%3A45%3A35Z&ske=2026-06-21T03%3A45%3A45Z&sks=b&skv=2018-11-09&sig=aVIzm6HJbCEY44%2FJxQwQuZgKrn%2FKyMKdCKeYqXE79r4%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc4MjAxMjU0OCwibmJmIjoxNzgyMDEwNzQ4LCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.39Go6YBsXW6bRrI7PY7YJwxJxLeb7wpBFGHaFhL0WRM&response-content-disposition=attachment%3B%20filename%3Dpkg2appimage-1eceb30-x86_64.AppImage&response-content-type=application%2Foctet-stream
        chmod +x pkg2appimage-1eceb30-x86_64.AppImage

    - name: Build AppImage
      run: |
        ./pkg2appimage-1eceb30-x86_64.AppImage recipe.yml

    - name: Upload Finished AppImage
