name: Build AppImage

on:
  workflow_dispatch: # Allows you to run this manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt-get clean
        sudo apt-get update --fix-missing
        sudo apt-get install -y imagemagick file desktop-file-utils


    - name: Download pkg2appimage
      run: |
        wget -c https://github.com/AppImageCommunity/pkg2appimage/releases/download/continuous/pkg2appimage-1eceb30-x86_64.AppImage
        chmod +x pkg2appimage-1eceb30-x86_64.AppImage

    - name: Build AppImage
      run: |
        # 1. Download the real Brave deb package
        URL="https://github.com"
        wget -c "$URL" -O brave.deb

        # 2. Extract it completely into the AppDir layout
        mkdir -p brave.AppDir
        dpkg-deb -x brave.deb brave.AppDir/

        # 3. Create standard Linux desktop shortcut paths inside the AppDir
        mkdir -p brave.AppDir/usr/bin
        mkdir -p brave.AppDir/usr/share/applications
        mkdir -p brave.AppDir/usr/share/icons/hicolor/128x128/apps

        # 4. Safely relocate core binaries and assets to standard paths
        cp -r brave.AppDir/opt/://brave.com* brave.AppDir/usr/bin/ || true
        cp brave.AppDir/opt/://brave.combrave-browser.desktop brave.AppDir/usr/share/applications/brave.desktop || true
        cp brave.AppDir/opt/://brave.comproduct_logo_128.png brave.AppDir/usr/share/icons/hicolor/128x128/apps/brave.png || true

        # 5. Provide the mandatory AppImage launch anchors in the root folder
        cp brave.AppDir/opt/://brave.comproduct_logo_128.png brave.AppDir/brave.png || true
        cp brave.AppDir/opt/://brave.combrave-browser.desktop brave.AppDir/brave.desktop || true
        
        # 6. Set up a simple root executor script (AppRun)
        echo '#!/bin/bin/sh' > brave.AppDir/AppRun
        echo 'exec "${APPDIR}/usr/bin/brave-browser" "$@"' >> brave.AppDir/AppRun
        chmod +x brave.AppDir/AppRun

        # 7. Download official appimagetool and compress the directory
        wget -c "https://github.com"
        chmod +x appimagetool-x86_64.AppImage
        
        # 8. Compile the AppImage into the output folder
        mkdir -p out
        ./appimagetool-x86_64.AppImage --appimage-extract-and-run brave.AppDir out/Brave-Browser-x86_64.AppImage





    - name: Upload Finished AppImage
      uses: actions/upload-artifact@v4
      with:
        name: Finished-AppImage
        path: out/*.AppImage
